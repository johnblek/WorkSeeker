name: Weekly Lead Finder

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  find-leads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run lead finder
        run: python lead_finder.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit results to repo
        run: |
          git config user.name "Lead Finder Bot"
          git config user.email "bot@noreply.com"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git add leads.db reports/ reports_manifest.json
          git diff --staged --quiet || git commit -m "Weekly leads — $(date -u +%Y-%m-%d)"
          git push --force origin main
